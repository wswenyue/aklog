name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  # Release tarball + formula on_arm (Apple Silicon)
  RELEASE_DARWIN_ARM64: "true"
  # Release tarball + formula on_intel; set "true" when lib/darwin/x86_64/ is ready
  RELEASE_DARWIN_X86_64: "false"

jobs:
  quality:
    name: lint, typecheck, test, smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format check
        run: python -m ruff format --check src tests

      - name: Mypy
        run: python -m mypy src/aklog

      - name: Pytest with coverage
        run: python -m pytest tests --cov=aklog --cov-report=term-missing --cov-fail-under=75

      - name: Smoke (CLI import and launcher)
        run: |
          PYTHONPATH=src python -m aklog --version
          PYTHONPATH=src python -m aklog -h
          test -x aklog
          bash -n aklog
          PYTHONPATH=src python -c "from aklog.build_meta import __version__; assert __version__"

  prepare:
    name: plan release architectures
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - id: plan
        run: |
          set -euo pipefail
          items=()
          if [ "${RELEASE_DARWIN_ARM64}" = "true" ]; then
            items+=('{"os":"darwin","arch":"arm64"}')
          fi
          if [ "${RELEASE_DARWIN_X86_64}" = "true" ]; then
            items+=('{"os":"darwin","arch":"x86_64"}')
          fi
          if [ "${#items[@]}" -eq 0 ]; then
            echo "No release architectures enabled (RELEASE_DARWIN_ARM64 / RELEASE_DARWIN_X86_64)." >&2
            exit 1
          fi
          matrix=$(printf '%s\n' "${items[@]}" | jq -sc '.')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "## Release architectures" >> "$GITHUB_STEP_SUMMARY"
          echo "- RELEASE_DARWIN_ARM64: ${RELEASE_DARWIN_ARM64}" >> "$GITHUB_STEP_SUMMARY"
          echo "- RELEASE_DARWIN_X86_64: ${RELEASE_DARWIN_X86_64}" >> "$GITHUB_STEP_SUMMARY"
          echo "- package matrix: ${matrix}" >> "$GITHUB_STEP_SUMMARY"

  package:
    name: package ${{ matrix.os }}-${{ matrix.arch }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          chmod +x scripts/build-release-archive.sh
          scripts/build-release-archive.sh "${VERSION}" "${{ matrix.os }}" "${{ matrix.arch }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: aklog-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/aklog-*-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            dist/aklog-*-${{ matrix.os }}-${{ matrix.arch }}.sha256

  collect:
    name: build release manifest
    needs: [prepare, package]
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          pattern: aklog-darwin-*
          merge-multiple: true

      - name: Write release manifest
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          packages=()
          for arch in arm64 x86_64; do
            tgz=(packages/aklog-"${VERSION}"-darwin-"${arch}".tar.gz)
            sha_file=(packages/aklog-"${VERSION}"-darwin-"${arch}".sha256)
            if [ ! -f "${tgz[0]}" ]; then
              continue
            fi
            sha256="$(cat "${sha_file[0]}")"
            file="$(basename "${tgz[0]}")"
            url="${BASE}/${file}"
            packages+=("$(jq -nc --arg os darwin --arg arch "${arch}" --arg file "${file}" --arg url "${url}" --arg sha256 "${sha256}" '{os:$os,arch:$arch,file:$file,url:$url,sha256:$sha256}')")
          done
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No release packages found in artifacts." >&2
            exit 1
          fi
          jq -nc \
            --arg version "${VERSION}" \
            --arg tag "${TAG}" \
            --arg repo "${REPO}" \
            --argjson packages "$(printf '%s\n' "${packages[@]}" | jq -sc '.')" \
            '{version:$version,tag:$tag,repo:$repo,packages:$packages}' \
            > release-manifest.json
          cat release-manifest.json

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  release:
    name: publish GitHub release assets
    needs: [prepare, package, collect]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: aklog-darwin-*
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.tar.gz

  formula:
    name: generate homebrew formula
    needs: [release, collect]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: release-manifest

      - name: Generate formula
        run: |
          TAG="${GITHUB_REF_NAME}"
          chmod +x scripts/generate-homebrew-formula.sh
          scripts/generate-homebrew-formula.sh "${TAG}" "${GITHUB_REPOSITORY}" release-manifest.json formula.rb
          echo "## Homebrew formula" >> "$GITHUB_STEP_SUMMARY"
          echo "- version: ${TAG#v}" >> "$GITHUB_STEP_SUMMARY"
          echo "- RELEASE_DARWIN_ARM64: ${RELEASE_DARWIN_ARM64}" >> "$GITHUB_STEP_SUMMARY"
          echo "- RELEASE_DARWIN_X86_64: ${RELEASE_DARWIN_X86_64}" >> "$GITHUB_STEP_SUMMARY"
          echo "- on_arm: $([ "${RELEASE_DARWIN_ARM64}" = \"true\" ] && echo release tarball || echo source archive)" >> "$GITHUB_STEP_SUMMARY"
          echo "- on_intel: $([ "${RELEASE_DARWIN_X86_64}" = \"true\" ] && echo release tarball || echo source archive)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload formula
        uses: actions/upload-artifact@v4
        with:
          name: formula
          path: formula.rb

  homebrew:
    name: publish homebrew
    needs: formula
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout homebrew-aklog
        uses: actions/checkout@v4
        with:
          repository: wswenyue/homebrew-aklog
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          persist-credentials: true

      - name: Download formula
        uses: actions/download-artifact@v4
        with:
          name: formula

      - name: Update Formula
        run: |
          cp formula.rb Formula/aklog.rb
          rm -f formula.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aklog.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi
          git commit -m "chore: update aklog to ${{ github.ref_name }}"
          git push origin master
